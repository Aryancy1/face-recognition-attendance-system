{% extends "base.html" %}

{% block content %}

<h2>Attendance Records</h2>

<table class="table table-striped">

<tr>
<th>ID</th>
<th>Name</th>
<th>Date</th>
<th>Time</th>
</tr>

{% for row in rows %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
