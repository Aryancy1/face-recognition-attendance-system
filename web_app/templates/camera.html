{% extends "base.html" %}

{% block content %}

<h2>Mark Attendance</h2>

<div style="text-align:center">

<h3>Face Recognition Attendance</h3>

<video id="video" width="400" height="300" autoplay style="border:3px solid black; border-radius:10px;"></video>

<br><br>

<button onclick="capture()" class="btn btn-primary">
Mark Attendance
</button>

<p id="result" style="margin-top:20px; font-size:20px; font-weight:bold;"></p>

</div>

<script>

const video = document.getElementById("video")

// Start webcam
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
    video.srcObject = stream
})
.catch(err=>{
    console.log("Camera error:", err)
})

function capture(){

    const canvas = document.createElement("canvas")

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    const ctx = canvas.getContext("2d")

    // Capture frame from video
    ctx.drawImage(video,0,0)

    const image = canvas.toDataURL("image/jpeg")

    // Get GPS location
    navigator.geolocation.getCurrentPosition(function(position){

        const latitude = position.coords.latitude
        const longitude = position.coords.longitude

        fetch("/verify",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                image:image,
                latitude:latitude,
                longitude:longitude
            })

        })
        .then(res=>res.json())
        .then(data=>{

            // Display response
            document.getElementById("result").innerHTML =
                "Status: " + data.status +
                "<br>Name: " + (data.name || "Unknown") +
                "<br>Confidence: " + (data.confidence || 0) + "%"

        })
        .catch(err=>{
            console.log("Error:", err)
        })

    })

}

</script>

{% endblock %}
